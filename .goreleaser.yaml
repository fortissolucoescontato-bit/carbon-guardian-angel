project_name: carbon-guardian-angel

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    main: ./cmd/carbon
    binary: carbon-guardian-angel
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  github:
    owner: fortissolucoescontato-bit
    name: carbon-guardian-angel

brews:
  - repository:
      owner: fortissolucoescontato-bit
      name: homebrew-tap
    directory: Formula
    homepage: "https://github.com/fortissolucoescontato-bit/carbon-guardian-angel"
    description: "The Identity and Excellence Guardian for Nexo-Fortis AI agents."
    install: |
      bin.install "carbon-guardian-angel"
